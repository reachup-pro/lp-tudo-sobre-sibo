# Netlify config — LP Tudo Sobre SIBO

[build]
  publish = "."
  command = ""

# ----------------------------------------------------------------
# Headers
# ----------------------------------------------------------------

# HTML: nunca cachear pra garantir refresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Página raiz
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS/JS sem hash no nome: revalidar (cache buster ?v= no HTML)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Imagens podem cachear longo (immutable só seguro porque não mudam)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts (carregadas via Google + cdnfonts, não local — mantém como está)

# ----------------------------------------------------------------
# Subpath /curso (LP de vendas do curso completo — oferta imersão)
# Globs raiz não casam subpath; precisa duplicar com prefixo /curso/
# ----------------------------------------------------------------

[[headers]]
  for = "/curso/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/curso/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/curso/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/curso/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/curso/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect /curso (sem barra) → /curso/index.html
[[redirects]]
  from = "/curso"
  to = "/curso/index.html"
  status = 200

# ----------------------------------------------------------------
# Subpath /reset-intestinal (LP low-ticket B2C — Reset Intestinal R$47)
# Globs raiz não casam subpath; precisa duplicar com prefixo /reset-intestinal/
# ----------------------------------------------------------------

[[headers]]
  for = "/reset-intestinal/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/reset-intestinal/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/reset-intestinal/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/reset-intestinal/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/reset-intestinal/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ----------------------------------------------------------------
# Subpath /mastermind (LP lista de espera — Mastermind Microbiota)
# Globs raiz não casam subpath; precisa duplicar com prefixo /mastermind/
# ----------------------------------------------------------------

[[headers]]
  for = "/mastermind/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/mastermind/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/mastermind/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/mastermind/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/mastermind/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fontes self-hosted (nomes fixos, sem hash — mas nunca mudam de conteúdo)
[[headers]]
  for = "/mastermind/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ----------------------------------------------------------------
# Dashboard Imersão (subpágina) — segurança apertada
# - Referrer-Policy: no-referrer (S1: token em URL nunca vaza)
# - CSP sem 'unsafe-inline' (S3)
# - Sem GTM nessa rota (S2)
# ----------------------------------------------------------------

[[headers]]
  for = "/dashboard-imersao/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; connect-src 'self' https://viflrlxwvziimdbbcgtf.supabase.co wss://viflrlxwvziimdbbcgtf.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-ancestors 'none'"

# ----------------------------------------------------------------
# Dashboard Reset Intestinal (subpágina) — mesma segurança apertada
# - Referrer-Policy: no-referrer (token em URL nunca vaza)
# - CSP sem 'unsafe-inline' em script · sem GTM nessa rota
# ----------------------------------------------------------------

[[headers]]
  for = "/dashboard-reset-intestinal/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; connect-src 'self' https://viflrlxwvziimdbbcgtf.supabase.co wss://viflrlxwvziimdbbcgtf.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-ancestors 'none'"

# ----------------------------------------------------------------
# Redirects / SPA fallback (não há SPA, mas garante 200 nas rotas)
# ----------------------------------------------------------------

# Raiz → /curso/ (imersão encerrada, curso vira oferta principal)
[[redirects]]
  from = "/"
  to = "/curso/"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/curso/"
  status = 301
  force = true

# Dashboard Imersão (sem .html no URL público)
[[redirects]]
  from = "/dashboard-imersao"
  to = "/dashboard-imersao/index.html"
  status = 200

# Dashboard Reset Intestinal (sem .html no URL público)
[[redirects]]
  from = "/dashboard-reset-intestinal"
  to = "/dashboard-reset-intestinal/index.html"
  status = 200

# Política de privacidade (subpágina, se vier a existir)
[[redirects]]
  from = "/politica-de-privacidade"
  to = "/politica-de-privacidade/index.html"
  status = 200

# Redirect /reset-intestinal (sem barra) → /reset-intestinal/index.html
[[redirects]]
  from = "/reset-intestinal"
  to = "/reset-intestinal/index.html"
  status = 200

# Redirect /mastermind (sem barra) → /mastermind/index.html
[[redirects]]
  from = "/mastermind"
  to = "/mastermind/index.html"
  status = 200
